<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/akg/ Arknights Challenge</title>
    <style>
        body {
            background-color: #2e3440;
            color: #d8dee9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        main {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        #event-title {
            color: #88c0d0;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #5e81ac;
            font-size: 0.9rem;
        }
        
        .challenge-card {
            background: #3b4252;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #81a1c1;
        }

        .item-name {
            color: #88c0d0;
            font-size: 1.5rem;
            margin: 0 0 5px 0;
        }

        .category-name {
            color: #5e81ac;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 10px;
        }

        .category-desc {
            color: #5e81ac;
            font-size: 0.9rem;
            line-height: 1.4;
            margin: 0;
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1 id="event-title">/akg/ Arknights Challenge</h1>
            <p class="subtitle">New challenges (roughly) every third Sunday</p>
        </header>

        <div id="challenge-list"></div>
    </main>

    <script>
        async function init() {
            try {
                const response = await fetch('./latest.json');
                const data = await response.json();

                document.getElementById('event-title').innerText = data.event;

                const listContainer = document.getElementById('challenge-list');
                listContainer.innerHTML = data.challenges.map(item => `
                    <div class="challenge-card">
                        <h2 class="item-name">${item.name}</h2>
                        <span class="category-name">${item.categoryName}</span>
                        ${item.detail
                            ? `<p class="category-desc">${item.detail}</p>`
                            : ''
                        }
                        ${item.link
                            ? `<p class="category-desc"><a href="${item.link}">Link</a></p>`
                            : ''
                        }
                    </div>
                `).join('');

            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('event-title').innerText = "Something fucked up";
                document.getElementById('event-title').style.color = "#bf616a";
            }
        }

        init();
    </script>
</body>
</html>
